name: model-validation-and-deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_accuracy:
        description: 'Optional: force logged accuracy (example: 0.80 for fail, 0.95 for success)'
        required: false
        default: ''

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: classifier-ci-cd
      FORCE_ACCURACY: ${{ github.event.inputs.force_accuracy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull data with DVC
        run: dvc pull || echo "DVC remote not configured or data already absent in demo mode; continuing with local fallback in train.py"

      - name: Train model and log to MLflow
        run: python train.py

      - name: Create model_info.txt
        run: |
          if [ ! -f run_id.txt ]; then
            echo "run_id.txt not found"
            exit 1
          fi
          cat run_id.txt > model_info.txt
          echo "Created model_info.txt with Run ID: $(cat model_info.txt)"

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: validate
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.22.0

      - name: Check threshold
        run: python check_threshold.py

      - name: Mock Build
        run: echo "Building Docker image for Run ID: $(cat model_info.txt)"

      - name: Docker build
        run: docker build --build-arg RUN_ID=$(cat model_info.txt) -t classifier-model:latest .
